<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tigist Restaurant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Setup (first run) -->
    <section id="view-setup" class="view hidden" aria-hidden="true">
      <header class="header">
        <h1 class="brand" data-i18n="brand"> ትግስት ሬስቶራንት</h1>
        <p class="subtitle" data-i18n="setupSubtitle">መጀመሪያ አስተዳዳሪ መለያ ይፍጠሩ</p>
      </header>
      <form id="form-setup" class="card form">
        <label>
          <span data-i18n="displayName">ስም</span>
          <input type="text" id="setup-name" required autocomplete="username" />
        </label>
        <label>
          <span data-i18n="password">የይለፍ ቃል</span>
          <input type="password" id="setup-password" required autocomplete="new-password" minlength="4" />
        </label>
        <label>
          <span data-i18n="language">ቋንቋ</span>
          <select id="setup-lang">
            <option value="am">አማርኛ</option>
            <option value="om">Afaan Oromoo</option>
          </select>
        </label>
        <button type="submit" class="btn primary" data-i18n="createAccount">መለያ ፍጠር</button>
      </form>
    </section>

    <!-- Login -->
    <section id="view-login" class="view" aria-hidden="false">
      <header class="header">
        <h1 class="brand" data-i18n="brand">ትግስት ሬስቶራንት</h1>
        <p class="subtitle" data-i18n="loginSubtitle">ወደ ስርዓት ግባ</p>
      </header>
      <div class="toolbar login-toolbar">
        <button type="button" id="btn-theme-toggle" class="btn ghost icon-btn" title="" aria-label="">
          <span class="theme-icon" id="theme-icon">🌙</span>
        </button>
        <select id="login-lang" class="lang-select" aria-label="Language">
          <option value="am">አማርኛ</option>
          <option value="om">Afaan Oromoo</option>
        </select>
      </div>
      <form id="form-login" class="card form">
        <label>
          <span data-i18n="displayName">ስም</span>
          <input type="text" id="login-name" required autocomplete="username" />
        </label>
        <label>
          <span data-i18n="password">የይለፍ ቃል</span>
          <input type="password" id="login-password" required autocomplete="current-password" />
        </label>
        <p id="login-error" class="error hidden" role="alert"></p>
        <button type="submit" class="btn primary" data-i18n="login">ግባ</button>
      </form>
    </section>

    <!-- Main app -->
    <section id="view-main" class="view hidden" aria-hidden="true">
      <header class="header compact">
        <div>
          <h1 class="brand small" data-i18n="brand">ትግስት ሬስቶራንት</h1>
          <p class="user-line"><span data-i18n="loggedInAs">እንደ</span> <strong id="main-user-name"></strong></p>
        </div>
        <div class="toolbar">
          <select id="main-lang" class="lang-select">
            <option value="am">አማርኛ</option>
            <option value="om">Afaan Oromoo</option>
          </select>
          <button type="button" id="btn-main-theme" class="btn ghost icon-btn"><span id="main-theme-icon">🌙</span></button>
          <button type="button" id="btn-logout" class="btn ghost" data-i18n="logout">ውጣ</button>
        </div>
      </header>

      <nav class="tabs" role="tablist">
        <button type="button" class="tab active" data-tab="dashboard" data-i18n="tabDashboard">ዳሽቦርድ</button>
        <button type="button" class="tab" data-tab="sales" data-i18n="tabSales">ሽያጭ</button>
        <button type="button" class="tab" data-tab="expenses" data-i18n="tabExpenses">ወጪዎች</button>
        <button type="button" class="tab" data-tab="history" data-i18n="tabHistory">ታሪክ</button>
      </nav>

      <div id="panel-dashboard" class="panel active">
        <div class="stats-grid">
          <div class="stat card">
            <span class="stat-label" data-i18n="revenue">ገቢ</span>
            <span class="stat-value" id="stat-revenue">0</span>
          </div>
          <div class="stat card">
            <span class="stat-label" data-i18n="expenses">ወጪ</span>
            <span class="stat-value" id="stat-expenses">0</span>
          </div>
          <div class="stat card highlight">
            <span class="stat-label" data-i18n="profit">ትርፍ</span>
            <span class="stat-value" id="stat-profit">0</span>
          </div>
        </div>
        <p class="hint" data-i18n="dashboardHint">ዛሬ የተመዘገቡ ገቢ፣ ወጪ እና ትርፍ።</p>
      </div>

      <div id="panel-sales" class="panel hidden">
        <div class="sales-layout">
          <div class="catalog card">
            <h2 class="section-title" data-i18n="menuTitle">ምናሌ</h2>
            <div id="catalog-groups" class="catalog-groups"></div>
          </div>
          <div class="cart card">
            <h2 class="section-title" data-i18n="cartTitle">ስሌት / ቅዳ</h2>
            <ul id="cart-lines" class="cart-lines"></ul>
            <div class="cart-total">
              <span data-i18n="total">ጠቅላላ</span>
              <strong id="cart-total">0</strong>
            </div>
            <div class="pay-row">
              <button type="button" id="btn-pay-cash" class="btn secondary" data-i18n="payCash">ጥሬ ገንዘብ ይመዝገብ</button>
              <button type="button" id="btn-pay-ebirr" class="btn primary" data-i18n="payEbirr">ኢ-ብር</button>
            </div>
            <button type="button" id="btn-clear-cart" class="btn ghost small" data-i18n="clearCart">ቅዳ አጽዳ</button>
          </div>
        </div>
        <div id="modal-ebirr" class="modal hidden" role="dialog" aria-modal="true">
          <div class="modal-backdrop" data-close-modal></div>
          <div class="modal-card card">
            <h3 data-i18n="ebirrTitle">ኢ-ብር ክፍያ</h3>
            <p class="hint" data-i18n="ebirrHint">የክፍያ ስልክ ቁጥር (የባለቤቱ) እና መጠን። ከተረጋገጠ የከፋይ ስም ይታያል።</p>
            <label>
              <span data-i18n="phone">ስልክ</span>
              <input type="tel" id="ebirr-phone" placeholder="09xxxxxxxx" />
            </label>
            <label>
              <span data-i18n="amount">መጠን (ብር)</span>
              <input type="number" id="ebirr-amount" min="0" step="0.01" />
            </label>
            <button type="button" id="btn-ebirr-verify" class="btn secondary" data-i18n="verifyEbirr">አረጋግጥ</button>
            <div id="ebirr-result" class="ebirr-result hidden"></div>
            <div class="modal-actions">
              <button type="button" class="btn ghost" data-close-modal data-i18n="cancel">ተወው</button>
              <button type="button" id="btn-ebirr-confirm" class="btn primary hidden" data-i18n="confirmSale">ሽያጭ አረጋግጥ</button>
            </div>
          </div>
        </div>
      </div>

      <div id="panel-expenses" class="panel hidden">
        <form id="form-expense" class="card form">
          <h2 class="section-title" data-i18n="addExpense">ወጪ ጨምር</h2>
          <label>
            <span data-i18n="expenseDesc">መግለጫ</span>
            <input type="text" id="expense-desc" required />
          </label>
          <label>
            <span data-i18n="amount">መጠን (ብር)</span>
            <input type="number" id="expense-amount" min="0" step="0.01" required />
          </label>
          <button type="submit" class="btn primary" data-i18n="saveExpense">ወጪ አስቀምጥ</button>
        </form>
      </div>

      <div id="panel-history" class="panel hidden">
        <div class="card">
          <h2 class="section-title" data-i18n="recentTransactions">የቅርብ ግብይቶች</h2>
          <ul id="history-list" class="history-list"></ul>
        </div>
      </div>
    </section>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
